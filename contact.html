						<ul class="menu">
							<li class="nav-item">

									>Home<span></span

							<li class="nav-item">

				</div>
			</div>
		</nav>
		<!--Navbar End-->
		<main>
			<!--=== Contact Section ===-->
			<!--Contact Section Start-->
			<section class="contact-section section-padding" id="contact">
				<div class="container">
					<!--Section heading-->
					<div class="row">
						<div class="section-title text-align">
							<h1 class="sub-title">Contact</h1>
							<h2 class="main-title">Get in touch</h2>
							<!--Decorative line-->
							<ul class="line">
								<li></li>
								<li></li>
								<li></li>
							</ul>
						</div>
					</div>
					<!--Contact information cards-->
					<div class="row">
						<!--Phone information-->
						<!--Contact item start-->
						<div class="contact-item">
							<div class="contact-item-inner">
								<i class="fas fa-phone"></i>
								<span>Phone</span>
								<p>+44 7700 900123</p>
							</div>
						</div>
						<!--Contact item end-->

						<!--Email information-->
						<!--Contact item start-->
						<div class="contact-item">
							<div class="contact-item-inner">
								<i class="fas fa-envelope"></i>
								<span>Email</span>
								<p>info@buildmaster.co.uk</p>
							</div>
						</div>
						<!--Contact item end-->

						<!--Address information-->
						<!--Contact item start-->
						<div class="contact-item">
							<div class="contact-item-inner">
								<i class="fas fa-map-marker-alt"></i>
								<span>Address</span>
								<p>Bangor, Wales, United Kingdom</p>
							</div>
						</div>
						<!--Contact item end-->
					</div>
					<!--=== Contact Form ===-->
					<div class="row">
						<div class="contact-form">
							<form>
								<div class="row">
									<!--Left side inputs-->
									<div class="w-50">
										<!--Name field-->
										<div class="input-group">
											<input
												type="text"
												placeholder="Name"
												class="input-control"
											/>
										</div>
										<!--Email field-->
										<div class="input-group">
											<input
												type="email"
												placeholder="Email"
												class="input-control"
											/>
										</div>
										<!--Subject field-->
										<div class="input-group">
											<input
												type="text"
												placeholder="Subject"
												class="input-control"
											/>
										</div>
									</div>
									<!--Message textarea-->
									<div class="w-50">
										<div class="input-group">
											<textarea
												name="message"
												class="input-control"
												placeholder="Message"
												id="message"
												cols="30"
												rows="10"
											></textarea>
										</div>
									</div>
								</div>
								<!--Submit button-->
								<div class="row">
									<div class="submit-btn">
										<button type="submit" class="btn-1">Send Message</button>
									</div>
								</div>
							</form>
						</div>
					</div>
				</div>
			</section>
			<!--Contact Section End-->
		</main>
		<!--=== Footer ===-->

		</footer>
		<!--Footer Section End-->
	</body>
