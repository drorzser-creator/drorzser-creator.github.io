<!doctype html>
<html lang="en">
	<head>
		<!--Character encoding and responsive settings-->
		<meta charset="UTF-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<!--Page title-->
		<title>Portfolio | BuildMaster Construction</title>

		<!--SEO description-->
		<meta
			name="description"
			content="View our latest residential and commercial construction projects."
		/>
		<!--Website author-->
		<meta name="author" content="BuildMaster Construction" />

		<!--Browser theme color-->
		<meta name="theme-color" content="#f39c12" />

		<!--Open Graph metadata for social media sharing-->
		<meta property="og:type" content="website" />
		<meta property="og:title" content="BuildMaster Construction" />
		<meta
			property="og:description"
			content="Professional residential and commercial construction services."
		/>
		<meta
			property="og:image"
			content="https://buildmasterbangor.me/images/image.png"
		/>
		<meta property="og:url" content="https://buildmasterbangor.me" />

		<!--Twitter card metadata-->
		<meta name="twitter:card" content="summary_large_image" />

		<meta name="twitter:title" content="BuildMaster Construction" />
		<meta
			name="twitter:description"
			content="Professional residential and commercial construction services."
		/>

		<meta
			name="twitter:image"
			content="https://buildmasterbangor.me/images/image.png"
		/>

		<!--Website favicon-->
		<link rel="icon" href="images/logo.ico" />
		<!--Font Awesome icons-->
		<link
			rel="stylesheet"
			href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
		/>
		<!--Main stylesheet-->
		<link rel="stylesheet" href="css/style.css" />
		<!--Main JavaScript file-->
		<script defer src="js/main.js"></script>
	</head>
	<body>
		<!--=== Navigation Bar ===-->
		<!--Navbar Start-->
		<nav class="navbar">
			<div class="container">
				<div class="row justify-content-between">
					<!--Website logo-->
					<div class="logo">
						<a href="index.html">Build<span>Master</span></a>
					</div>

					<!--Navigation links-->
					<div class="links">
						<ul class="menu">
							<li class="nav-item">
								<a href="index.html" class="nav-link active"
									>Home<span></span
								></a>
							</li>
							<li class="nav-item">
								<a href="about.html" class="nav-link">About<span></span></a>
							</li>
							<li class="nav-item">
								<a href="services.html" class="nav-link"
									>Services<span></span
								></a>
							</li>
							<li class="nav-item">
								<a href="portfolio.html" class="nav-link"
									>Portfolio<span></span
								></a>
							</li>
							<li class="nav-item">
								<a href="pricing.html" class="nav-link">Pricing<span></span></a>
							</li>
							<li class="nav-item">
								<a href="contact.html" class="nav-link">Contact<span></span></a>
							</li>
						</ul>
					</div>

					<!--Mobile navigation menu button-->
					<div class="menu-btn">
						<i class="fas fa-bars"></i>
					</div>
				</div>
			</div>
		</nav>
		<!--Navbar End-->
		<main>
			<!--=== Portfolio Section ===-->
			<!--Portfolio Section Start-->
			<section class="portfolio section-padding" id="portfolio">
				<div class="container">
					<!--Section heading-->
					<div class="row">
						<div class="section-title text-align">
							<h1 class="sub-title">Portfolio</h1>
							<h2 class="main-title">Our latest work</h2>
							<!--Decorative line-->
							<ul class="line">
								<li></li>
								<li></li>
								<li></li>
							</ul>
						</div>
					</div>
					<!--Portfolio category filter buttons-->
					<div class="row">
						<div class="portfolio-filter">
							<button type="button" class="active" data-filter="all">
								All
							</button>
							<button type="button" data-filter="residential">
								Residential
							</button>
							<button type="button" data-filter="renovation">Renovation</button>
							<button type="button" data-filter="commercial">Commercial</button>
						</div>
					</div>
					<div class="row">
						<!--Dynamic portfolio items container-->
						<!--Portfolio-items start-->
						<div class="row portfolio-items-container"></div>
						<!--Portfolio-items end-->
					</div>
				</div>
			</section>
			<!--Portfolio Section End-->

			<!--Carousel Section Start-->
			<section class="carousel section-padding" id="carousel">
				<!--Carousel heading -->
				<div class="section-title text-align">
					<h3 class="sub-title">Carousel</h3>
					<h4 class="main-title">Featured Projects</h4>
				</div>

				<!--Image carousel container-->
				<div class="carousel-container">
					<div class="carousel-item">
						<!--Main carousel image-->
						<img
							class="carousel-img"
							src="images/portfolio/portfolio-2.jpg"
							alt=""
						/>
						<!--Dynamic carousel title-->
						<h4 class="carousel-title">*</h4>
						<!--Dynamic carousel description-->
						<p class="carousel-desc"></p>

						<!--Carousel navigation buttons-->
						<div class="carousel-controls">
							<button class="prev-btn">
								<i class="fa fa-angle-left"></i>
							</button>

							<button class="next-btn">
								<i class="fa fa-angle-right"></i>
							</button>
						</div>
					</div>
					<!--Carousel indicator dots-->
					<div class="carousel-dots"></div>
				</div>
			</section>
			<!--Carousel Section End-->
		</main>
		<!--=== Footer ===-->
		<!--Footer Section Start-->
		<footer class="footer">
			<div class="container">
				<div class="row justify-content-center">
					<!--Copyright information-->
					<p class="copyright-text">&copy; 2026 BuildMaster Construction</p>
				</div>
			</div>
		</footer>
		<!--Footer Section End-->

		<!--=== Lightbox ===-->
		<!--Lightbox Start-->
		<div class="lightbox">
			<div class="lightbox-content">
				<!--Close lightbox button-->
				<div class="lightbox-close">&times;</div>

				<!--Lightbox image-->
				<img
					src="images/portfolio/portfolio-2.jpg"
					class="lightbox-img"
					alt=""
				/>

				<!--Image caption area-->
				<div class="lightbox-caption">
					<div class="caption-text"></div>
					<div class="caption-counter"></div>
				</div>
			</div>

			<!--Previous and next navigation controls-->
			<div class="lightbox-controls">
				<div class="prev-item">
					<i class="fa fa-angle-left"></i>
				</div>
				<div class="next-item">
					<i class="fa fa-angle-right"></i>
				</div>
			</div>
		</div>
		<!--Lightbox End-->
	</body>
</html>
